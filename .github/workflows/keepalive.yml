name: Keep-alive ping

on:
  schedule:
    # 毎日 UTC 0:00 (日本時間 9:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        # -sf でエラーを失敗扱いにし、失敗した場合は10秒間隔で最大3回リトライする
        run: curl -sf --retry 3 --retry-delay 10 --retry-all-errors https://syncschedule.onrender.com/health/ > /dev/null